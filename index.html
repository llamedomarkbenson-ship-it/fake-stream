<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake Stream Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="video-section">
    <video id="video" autoplay playsinline></video>
    <div class="live-badge">🔴 LIVE</div>
    <div class="viewer-count">👀 <span id="viewers">0</span></div>
  </div>

  <div class="chat-section">
    <div id="chat"></div>
  </div>

  <div class="reactions">
    ❤️ <span id="likes">0</span>
    😂 <span id="laughs">0</span>
    😮 <span id="wows">0</span>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
